<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>안전체험교육 설문</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

<h1>안전체험교육 설문</h1>

<p>나는 어떤 친구인가요?</p>

<button onclick="selectGroup('유아')">유치원 / 어린이집</button>
<button onclick="selectGroup('초등')">초등학교 저학년</button>

<hr>

<p>안전체험교육을 통해 위험 상황에서 어떻게 행동해야 하는지 잘 알게 되었나요?</p>

<button onclick="submitAnswer('O')">O</button>
<button onclick="submitAnswer('△')">△</button>
<button onclick="submitAnswer('X')">X</button>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbwjVA823g4Kf2KSpd8r5fxhJkdc0fk7GohS40l0umWyf3yex2_vimTiBxA398AZNF4P/exec";

let selectedGroup = "";

function selectGroup(group){
selectedGroup = group;
alert("선택된 그룹: " + group);
}

function submitAnswer(answer){

if(!selectedGroup){
alert("먼저 그룹을 선택하세요.");
return;
}

const today = new Date().toISOString().slice(0,10);

fetch(sheetURL,{
method:"POST",
body: JSON.stringify({
date: today,
group: selectedGroup,
answer: answer
})
})
.then(res=>res.text())
.then(()=>{
alert("응답이 저장되었습니다!");
});

}

</script>

</body>
</html>
